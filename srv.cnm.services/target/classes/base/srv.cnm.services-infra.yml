gridverse:
  storage:
    object-endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    object-access-key: ${MINIO_ACCESS_KEY:gridverse}
    object-secret-key: ${MINIO_SECRET_KEY:gridverse-local-secret}
