name: gridverse
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gridverse
      POSTGRES_USER: gridverse
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-gridverse-local}"
    ports: ["5432:5432"]
    volumes: ["./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro"]
  network-store:
    image: powsybl/network-store-server@sha256:46a792de65e894060ee051fd84a6c27dc7178af6bca9c039594d237c11131eb3
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/iidm
      SPRING_DATASOURCE_USERNAME: gridverse
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-gridverse-local}"
    depends_on: [postgres]
    ports: ["8086:8080"]
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports: ["9200:9200"]
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-gridverse}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-gridverse-local-secret}"
    ports: ["9000:9000", "9001:9001"]
  rabbitmq:
    image: rabbitmq:4.0-management-alpine
    ports: ["5672:5672", "15672:15672"]
  camunda:
    image: camunda/camunda-bpm-platform:run-7.22.0
    ports: ["8085:8080"]
  otel-collector:
    image: otel/opentelemetry-collector:0.116.1
    command: ["--config=/etc/otel.yml"]
    volumes: ["./otel-collector.yml:/etc/otel.yml:ro"]
    ports: ["4317:4317", "4318:4318"]
  cnm:
    build: {context: ../srv.cnm.services}
    environment:
      MINIO_ENDPOINT: http://minio:9000
      ELASTICSEARCH_URL: http://elasticsearch:9200
      RABBITMQ_HOST: rabbitmq
      POSTGRES_URL: jdbc:postgresql://postgres:5432/gridverse
      POWSYBL_SERVICES_NETWORK_STORE_SERVER_BASE_URI: http://network-store:8080/
    depends_on: [network-store, minio, elasticsearch, rabbitmq]
    ports: ["8081:8081"]
  computation:
    build: {context: ../srv.computation.services}
    ports: ["8082:8082"]
    environment:
      POWSYBL_SERVICES_NETWORK_STORE_SERVER_BASE_URI: http://network-store:8080/
    depends_on: [network-store]
  optimization:
    build: {context: ../srv.optimization.services}
    ports: ["8083:8083"]
  rsa:
    build: {context: ../srv.rsa.services}
    ports: ["8084:8084"]
    environment:
      POWSYBL_SERVICES_NETWORK_STORE_SERVER_BASE_URI: http://network-store:8080/
      POSTGRES_URL: jdbc:postgresql://postgres:5432/gridverse
      POSTGRES_USER: gridverse
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-gridverse-local}"
      RABBITMQ_HOST: rabbitmq
    depends_on: [network-store, postgres, rabbitmq]
  gui-cnm:
    build: {context: ../gui.cnm.manage}
    ports: ["8088:80"]
  gui-rsa:
    build: {context: ../gui.rsa}
    ports: ["8089:80"]
